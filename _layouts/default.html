<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description | strip_newlines }}">
  <meta name="author" content="{{ site.name }}">

  <!-- Open Graph / social preview -->
  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description | strip_newlines }}">
  <meta property="og:type" content="website">
  {% if site.photo %}<meta property="og:image" content="{{ site.photo | absolute_url }}">{% endif %}

  <link rel="icon" type="image/png" href="{{ site.photo | relative_url }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,500;0,6..72,600;1,6..72,500&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Set theme before paint to avoid flash -->
  <script>
    (function () {
      var saved = localStorage.getItem('theme');
      var dark = saved ? saved === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>

  {% if site.google_analytics %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {% endif %}
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
    <i class="fa-solid fa-moon"></i>
  </button>

  <main class="wrapper">
    {{ content }}

    <footer class="site-footer">
      <p>&copy; {{ 'now' | date: '%Y' }} {{ site.name }}. Built with
        <a href="https://jekyllrb.com/">Jekyll</a> &amp; hosted on
        <a href="https://pages.github.com/">GitHub Pages</a>.</p>
    </footer>
  </main>

  <script>
    var toggle = document.getElementById('theme-toggle');
    var icon = toggle.querySelector('i');
    function syncIcon() {
      var isDark = document.documentElement.classList.contains('dark');
      icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }
    syncIcon();
    toggle.addEventListener('click', function () {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem(
        'theme',
        document.documentElement.classList.contains('dark') ? 'dark' : 'light'
      );
      syncIcon();
    });
  </script>
</body>
</html>
