# --- About / bio -----------------------------------------------------------
# Written in Markdown. Edit freely.
bio: >-
  I am a cognitive scientist at the University of Cambridge. My research
  examines how people detect and perceive faces, how visual attention is
  deployed across the visual field, and how these abilities emerge over
  development. I am also interested in social cognition and autism spectrum
  conditions.


  My work combines behavioural experiments, eye-tracking, and the development
  of new research methods to understand the mechanisms of human perception.

