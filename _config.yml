# --- About / bio -----------------------------------------------------------
# Written in Markdown. Edit freely.
bio: >-
  I am a cognitive scientist at the Centre for the Future of Intelligence,
  University of Cambridge. I use the methods of experimental psychology to
  understand cognition in both humans and machines — from how large language
  and multimodal models reason, perceive, and can be rigorously evaluated, to
  how people detect and perceive faces and how these abilities emerge in
  infancy.


  Before joining Cambridge I completed a PhD in Developmental Psychology at the
  University of Kent, studying face detection, visual attention, and infant
  social cognition. My work combines behavioural experiments, eye-tracking, and
  the development of new evaluation methods.

